services:
  - type: web
    name: trainermate-zoom-demo
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ZOOM_CLIENT_ID
        sync: false
      - key: ZOOM_CLIENT_SECRET
        sync: false
      - key: TRAINERMATE_ZOOM_REDIRECT_URI
        value: https://demo.trainermate.xyz/zoom/callback
      - key: TRAINERMATE_ZOOM_OAUTH_STATE_SECRET
        sync: false
